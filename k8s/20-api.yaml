# FastAPI prediction service. Reads trained policies from a PVC that is
# expected to be populated by a training Job (see 30-train-job.yaml).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: experiments-data
  namespace: food-rescue
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: food-rescue
  labels: { app: api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: food-rescue-serve:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: CORS_ALLOW_ORIGINS
              value: "*"
          volumeMounts:
            - name: experiments
              mountPath: /app/experiments
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
      volumes:
        - name: experiments
          persistentVolumeClaim:
            claimName: experiments-data
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: food-rescue
spec:
  selector: { app: api }
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
