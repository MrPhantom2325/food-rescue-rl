# Run-to-completion training Job. Writes trained policies to the same PVC
# that the API reads from, so a fresh policy goes live after the API restarts
# (or after a rolling update triggered by a GitOps controller).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: train-dqn
  namespace: food-rescue
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels: { app: train, agent: dqn }
    spec:
      restartPolicy: Never
      containers:
        - name: train
          image: food-rescue-train:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CONFIG
              value: "configs/dqn_tuned.yaml"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
          volumeMounts:
            - name: experiments
              mountPath: /app/experiments
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2000m", memory: "4Gi" }
      volumes:
        - name: experiments
          persistentVolumeClaim:
            claimName: experiments-data
